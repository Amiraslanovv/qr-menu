<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Menyu</title>
  <meta name="theme-color" content="#1a1a1a" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1c1c1e;
      --surface2: #2c2c2e;
      --border: rgba(255,255,255,0.08);
      --text: #f5f5f5;
      --muted: #8e8e93;
      --accent: #d4a853;
      --accent-dim: rgba(212,168,83,0.15);
      --green: #34c759;
      --red: #ff453a;
      --radius: 14px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      overscroll-behavior: none;
    }

    /* ── Loading screen ── */
    #loading {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px; z-index: 100;
      transition: opacity 0.4s;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    .spinner {
      width: 36px; height: 36px;
      border: 2.5px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Cover ── */
    .cover {
      position: relative;
      height: 220px;
      background: var(--surface);
      overflow: hidden;
    }
    .cover-img {
      width: 100%; height: 100%;
      object-fit: cover;
      opacity: 0.6;
    }
    .cover-gradient {
      position: absolute; inset: 0;
      background: linear-gradient(to bottom, rgba(15,15,15,0.1) 0%, rgba(15,15,15,0.85) 100%);
    }
    .cover-info {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 20px 20px 16px;
      display: flex; align-items: flex-end; gap: 14px;
    }
    .logo-wrap {
      width: 64px; height: 64px; flex-shrink: 0;
      border-radius: 16px;
      background: var(--surface2);
      border: 2px solid var(--border);
      overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
    }
    .logo-wrap img { width: 100%; height: 100%; object-fit: cover; }
    .cover-text h1 { font-size: 22px; font-weight: 700; line-height: 1.2; }
    .cover-text p { font-size: 13px; color: var(--muted); margin-top: 3px; }

    /* ── Quick actions ── */
    .quick-actions {
      display: flex; gap: 8px;
      padding: 14px 16px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .quick-actions::-webkit-scrollbar { display: none; }
    .action-btn {
      flex-shrink: 0;
      display: flex; align-items: center; gap: 6px;
      padding: 8px 14px;
      border-radius: 20px;
      background: var(--surface);
      border: 0.5px solid var(--border);
      color: var(--text);
      font-size: 13px;
      font-weight: 500;
      text-decoration: none;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }
    .action-btn:active { background: var(--surface2); }
    .action-btn .icon { font-size: 15px; }
    .action-btn.primary {
      background: var(--accent-dim);
      border-color: rgba(212,168,83,0.3);
      color: var(--accent);
    }

    /* ── Special offer banner ── */
    .special-banner {
      margin: 0 16px 4px;
      padding: 12px 14px;
      background: var(--accent-dim);
      border: 0.5px solid rgba(212,168,83,0.25);
      border-radius: var(--radius);
    }
    .special-banner .label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 4px;
    }
    .special-banner h3 { font-size: 15px; font-weight: 600; }
    .special-banner .prices {
      display: flex; align-items: center; gap: 8px;
      margin-top: 6px;
    }
    .special-banner .old-price {
      font-size: 13px;
      color: var(--muted);
      text-decoration: line-through;
    }
    .special-banner .new-price {
      font-size: 17px; font-weight: 700;
      color: var(--accent);
    }

    /* ── Category tabs ── */
    .tabs-wrap {
      position: sticky; top: 0; z-index: 10;
      background: rgba(15,15,15,0.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 0.5px solid var(--border);
    }
    .tabs {
      display: flex; gap: 2px;
      padding: 10px 12px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tab {
      flex-shrink: 0;
      padding: 7px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
      border: 0.5px solid transparent;
    }
    .tab.active {
      background: var(--accent-dim);
      border-color: rgba(212,168,83,0.3);
      color: var(--accent);
    }

    /* ── Menu section ── */
    .section { padding: 20px 16px 4px; }
    .section-title {
      font-size: 19px; font-weight: 700;
      margin-bottom: 12px;
      display: flex; align-items: center; gap: 8px;
    }

    /* ── Menu item card ── */
    .item-card {
      display: flex; gap: 12px;
      padding: 14px 0;
      border-bottom: 0.5px solid var(--border);
      position: relative;
    }
    .item-card:last-child { border-bottom: none; }
    .item-img {
      width: 80px; height: 80px; flex-shrink: 0;
      border-radius: 10px;
      object-fit: cover;
      background: var(--surface2);
    }
    .item-img-placeholder {
      width: 80px; height: 80px; flex-shrink: 0;
      border-radius: 10px;
      background: var(--surface2);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
    }
    .item-body { flex: 1; min-width: 0; }
    .item-badges {
      display: flex; gap: 4px; flex-wrap: wrap;
      margin-bottom: 4px;
    }
    .badge {
      font-size: 10px; font-weight: 600;
      padding: 2px 6px;
      border-radius: 4px;
      letter-spacing: 0.03em;
    }
    .badge-popular { background: rgba(255,149,0,0.2); color: #ff9500; }
    .badge-new { background: rgba(48,209,88,0.2); color: #30d158; }
    .badge-unavailable { background: rgba(255,69,58,0.15); color: var(--red); }
    .item-name {
      font-size: 15px; font-weight: 600;
      line-height: 1.3;
    }
    .item-name.unavailable { opacity: 0.45; }
    .item-desc {
      font-size: 12px; color: var(--muted);
      margin-top: 3px; line-height: 1.4;
    }
    .item-meta {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 8px;
    }
    .item-price {
      font-size: 16px; font-weight: 700;
      color: var(--accent);
    }
    .item-weight {
      font-size: 11px; color: var(--muted);
      margin-top: 1px;
    }

    /* ── WiFi card ── */
    .wifi-card {
      margin: 16px 16px 0;
      padding: 14px;
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      display: flex; align-items: center; gap: 12px;
    }
    .wifi-icon { font-size: 22px; }
    .wifi-label { font-size: 11px; color: var(--muted); }
    .wifi-pass { font-size: 15px; font-weight: 600; font-family: monospace; letter-spacing: 0.05em; }
    .wifi-copy {
      margin-left: auto;
      padding: 6px 12px;
      border-radius: 8px;
      background: var(--surface2);
      border: 0.5px solid var(--border);
      color: var(--text);
      font-size: 12px;
      cursor: pointer;
    }
    .wifi-copy:active { opacity: 0.7; }

    /* ── Footer ── */
    .footer {
      padding: 28px 16px calc(20px + var(--safe-bottom));
      text-align: center;
    }
    .footer p { font-size: 12px; color: var(--muted); }
    .footer a { color: var(--accent); text-decoration: none; }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: calc(20px + var(--safe-bottom)); left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface2);
      border: 0.5px solid var(--border);
      padding: 10px 18px;
      border-radius: 24px;
      font-size: 13px;
      font-weight: 500;
      z-index: 200;
      transition: transform 0.3s cubic-bezier(.34,1.56,.64,1);
      white-space: nowrap;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <p style="font-size:13px;color:#8e8e93">Menyu yüklənir...</p>
</div>

<div id="app" style="display:none"></div>
<div id="toast"></div>

<script>
  // ── Helpers ────────────────────────────────────────────────
  const $ = (s, ctx = document) => ctx.querySelector(s);
  const $$ = (s, ctx = document) => [...ctx.querySelectorAll(s)];

  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2000);
  }

  function copyWifi(password) {
    navigator.clipboard?.writeText(password).then(() => showToast("WiFi şifrəsi kopyalandı ✓"));
  }

  // ── Get slug from URL ──────────────────────────────────────
  // Expected URL: /menu/<slug>/  or ?slug=<slug> in dev
  function getSlug() {
    const parts = window.location.pathname.split("/").filter(Boolean);
    const menuIdx = parts.indexOf("menu");
    if (menuIdx !== -1 && parts[menuIdx + 1]) return parts[menuIdx + 1];
    return new URLSearchParams(window.location.search).get("slug") || "kafe-seher";
  }

  // ── Render ─────────────────────────────────────────────────
  function renderMenu(data) {
    const currency = data.currency || "AZN";

    // Cover section
    const coverHtml = `
      <div class="cover">
        ${data.cover_image
          ? `<img class="cover-img" src="${data.cover_image}" alt="${data.name}" />`
          : `<div style="width:100%;height:100%;background:linear-gradient(135deg,#2c2c2e,#1c1c1e)"></div>`}
        <div class="cover-gradient"></div>
        <div class="cover-info">
          <div class="logo-wrap">
            ${data.logo ? `<img src="${data.logo}" alt="logo">` : "🍽️"}
          </div>
          <div class="cover-text">
            <h1>${data.name}</h1>
            ${data.description ? `<p>${data.description}</p>` : ""}
          </div>
        </div>
      </div>`;

    // Quick actions
    const actionsHtml = `
      <div class="quick-actions">
        ${data.whatsapp
          ? `<a class="action-btn primary" href="https://wa.me/${data.whatsapp.replace(/\D/g,'')}">
               <span class="icon">💬</span> WhatsApp sifariş
             </a>`
          : ""}
        ${data.phone
          ? `<a class="action-btn" href="tel:${data.phone}">
               <span class="icon">📞</span> Zəng et
             </a>`
          : ""}
        ${data.address
          ? `<span class="action-btn" onclick="showToast('${data.address}')">
               <span class="icon">📍</span> Ünvan
             </span>`
          : ""}
      </div>`;

    // Daily specials
    const activeSpecials = (data.specials || []).filter(s => s);
    const specialsHtml = activeSpecials.map(s => `
      <div class="special-banner">
        <div class="label">✨ Günün xüsusi təklifi</div>
        <h3>${s.title}</h3>
        ${s.description ? `<p style="font-size:13px;color:#8e8e93;margin-top:3px">${s.description}</p>` : ""}
        <div class="prices">
          ${s.original_price ? `<span class="old-price">${s.original_price} ${currency}</span>` : ""}
          <span class="new-price">${s.special_price} ${currency}</span>
          ${s.original_price ? `<span style="font-size:11px;color:#34c759;font-weight:600">ENDİRİM</span>` : ""}
        </div>
      </div>`).join("");

    // Category tabs
    const categories = (data.categories || []).filter(c => c.items?.length > 0);
    const tabsHtml = `
      <div class="tabs-wrap">
        <div class="tabs" id="tabs">
          ${categories.map((cat, i) =>
            `<div class="tab ${i===0?"active":""}" data-idx="${i}" onclick="scrollToSection(${i})">
               ${cat.icon ? cat.icon + " " : ""}${cat.name}
             </div>`
          ).join("")}
        </div>
      </div>`;

    // Menu sections
    const sectionsHtml = categories.map((cat, catIdx) => {
      const items = cat.items.map(item => {
        const badges = [
          !item.is_available ? `<span class="badge badge-unavailable">Mövcud deyil</span>` : "",
          item.is_popular ? `<span class="badge badge-popular">🔥 Populyar</span>` : "",
          item.is_new ? `<span class="badge badge-new">✨ Yeni</span>` : "",
        ].filter(Boolean).join("");

        return `
          <div class="item-card">
            ${item.image
              ? `<img class="item-img" src="${item.image}" alt="${item.name}" loading="lazy" />`
              : `<div class="item-img-placeholder">${cat.icon || "🍴"}</div>`}
            <div class="item-body">
              ${badges ? `<div class="item-badges">${badges}</div>` : ""}
              <div class="item-name ${!item.is_available?"unavailable":""}">${item.name}</div>
              ${item.description ? `<div class="item-desc">${item.description}</div>` : ""}
              <div class="item-meta">
                <div>
                  <div class="item-price">${parseFloat(item.price).toFixed(2)} ${currency}</div>
                  ${item.weight_or_volume ? `<div class="item-weight">${item.weight_or_volume}</div>` : ""}
                </div>
              </div>
            </div>
          </div>`;
      }).join("");

      return `
        <div class="section" id="section-${catIdx}" data-idx="${catIdx}">
          <div class="section-title">${cat.icon ? cat.icon + " " : ""}${cat.name}</div>
          ${items}
        </div>`;
    }).join("");

    // WiFi
    const wifiHtml = data.wifi_password ? `
      <div class="wifi-card">
        <div class="wifi-icon">📶</div>
        <div>
          <div class="wifi-label">WiFi şifrəsi</div>
          <div class="wifi-pass">${data.wifi_password}</div>
        </div>
        <button class="wifi-copy" onclick="copyWifi('${data.wifi_password}')">Kopyala</button>
      </div>` : "";

    // Footer
    const footerHtml = `
      <div class="footer">
        <p>Bu rəqəmsal menyu <a href="#">QR Menyu AZ</a> tərəfindən hazırlanmışdır</p>
      </div>`;

    document.getElementById("app").innerHTML =
      coverHtml + actionsHtml + specialsHtml + tabsHtml + sectionsHtml + wifiHtml + footerHtml;

    document.getElementById("app").style.display = "block";

    // Activate tab on scroll
    const sections = $$(".section");
    const tabEls = $$("#tabs .tab");
    const tabsWrap = $(".tabs-wrap");

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const idx = parseInt(entry.target.dataset.idx);
          tabEls.forEach((t, i) => t.classList.toggle("active", i === idx));
          const activeTab = tabEls[idx];
          if (activeTab) activeTab.scrollIntoView({ behavior: "smooth", block: "nearest", inline: "center" });
        }
      });
    }, { rootMargin: `-${tabsWrap.offsetHeight + 60}px 0px -55% 0px` });

    sections.forEach(s => observer.observe(s));
  }

  window.scrollToSection = function(idx) {
    const el = document.getElementById(`section-${idx}`);
    if (!el) return;
    const offset = document.querySelector(".tabs-wrap").offsetHeight + 8;
    window.scrollTo({ top: el.offsetTop - offset, behavior: "smooth" });
  };

  // ── Fetch & render ─────────────────────────────────────────
  async function init() {
    const slug = getSlug();
    // In production: fetch(`/api/menu/${slug}/`)
    // For demo/development, we use mock data below
    try {
      const res = await fetch(`/api/menu/${slug}/`);
      if (!res.ok) throw new Error("not found");
      const data = await res.json();
      renderMenu(data);
    } catch {
      // Fallback: mock data so the page works standalone for demos
      renderMenu(MOCK_DATA);
    } finally {
      const loader = document.getElementById("loading");
      loader.classList.add("hidden");
      setTimeout(() => loader.remove(), 500);
    }
  }

  // ── Mock data (for standalone demo) ───────────────────────
  const MOCK_DATA = {
    name: "Kafe Şəhər",
    description: "Mingachevirin ən gözəl kafe menyusu",
    phone: "+994 50 000 00 00",
    whatsapp: "+994500000000",
    address: "Mingachevir şəh., Heydər Əliyev pr. 12",
    wifi_password: "kafeSEHER2025",
    currency: "AZN",
    cover_image: null,
    logo: null,
    specials: [{
      title: "Günün xüsusi: Kebab + Çay dəsti",
      description: "Lülə kebab + 2 stəkan çay birlikdə",
      original_price: "11.30",
      special_price: "9.00",
    }],
    categories: [
      {
        name: "İçkilər", icon: "☕",
        items: [
          { name: "Türk qəhvəsi", price: "2.50", description: "Ənənəvi üsulla hazırlanmış", is_popular: true, is_new: false, is_available: true },
          { name: "Çay (stəkan)", price: "0.80", description: "Azərbaycan çayı, limonla", is_popular: false, is_new: false, is_available: true },
          { name: "Portağal şirəsi", price: "3.00", description: "Təzə sıxılmış", is_popular: false, is_new: true, is_available: true },
          { name: "Limonad", price: "2.00", description: "Ev hazırlanması", is_popular: false, is_new: false, is_available: true },
          { name: "Su (0.5L)", price: "0.50", description: "", is_popular: false, is_new: false, is_available: true },
        ]
      },
      {
        name: "Yeməklər", icon: "🍽️",
        items: [
          { name: "Plov", price: "7.00", description: "Ənənəvi Azərbaycan plovu, şabalıd və kişmişlə", weight_or_volume: "350q", is_popular: true, is_new: false, is_available: true },
          { name: "Dolma", price: "8.00", description: "Üzüm yarpağında ətli dolma", weight_or_volume: "300q", is_popular: false, is_new: false, is_available: true },
          { name: "Kebab (lülə)", price: "9.00", description: "Əlcək soğan və pomidor ilə", weight_or_volume: "250q", is_popular: true, is_new: false, is_available: true },
          { name: "Düşbərə", price: "5.00", description: "Ev hazırlanması kiçik xəmirli", weight_or_volume: "250ml", is_popular: false, is_new: false, is_available: false },
        ]
      },
      {
        name: "Salatlar", icon: "🥗",
        items: [
          { name: "Kənd salatı", price: "4.00", description: "Pomidor, xiyar, soğan, zeytun yağı", weight_or_volume: "200q", is_popular: false, is_new: false, is_available: true },
          { name: "Çoban salatı", price: "4.50", description: "Əlavə pendir ilə", weight_or_volume: "220q", is_popular: false, is_new: false, is_available: true },
        ]
      },
      {
        name: "Desert", icon: "🍰",
        items: [
          { name: "Paklavа", price: "3.00", description: "Ev hazırlanması, qoz ilə", weight_or_volume: "100q", is_popular: true, is_new: false, is_available: true },
          { name: "Şəkərbura", price: "2.50", description: "", weight_or_volume: "80q", is_popular: false, is_new: false, is_available: true },
          { name: "Gündəlik tort", price: "4.00", description: "Hər gün fərqli növ", is_popular: false, is_new: true, is_available: true },
        ]
      },
    ]
  };

  init();
</script>
</body>
</html>
